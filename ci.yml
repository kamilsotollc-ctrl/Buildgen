name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  end-to-end-unix:
    name: Generated Makefile actually builds (Linux + macOS)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Generate build scripts from example manifest
        run: buildgen examples/example_project/build.yaml -o examples/example_project
      - name: Run generated Makefile
        working-directory: examples/example_project
        run: |
          make configure
          make build
          make test

  end-to-end-windows:
    name: Generated Build.bat actually builds (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Generate build scripts from example manifest
        run: buildgen examples/example_project/build.yaml -o examples/example_project
      - name: Run generated mswin32\Build.bat
        working-directory: examples/example_project
        run: |
          mswin32\Build.bat configure
          mswin32\Build.bat build
          mswin32\Build.bat test
        shell: cmd
